<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Universe Hub</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; color: #0f0; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }
        h1 { margin: 0 0 10px 0; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        p { margin: 0; font-size: 14px; opacity: 0.8; }
        #controls-help {
            position: absolute;
            bottom: 20px;
            left: 20px;
            pointer-events: none;
            font-size: 12px;
            opacity: 0.7;
        }
        #interaction-prompt {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px #fff;
            pointer-events: none;
            display: none;
        }
        /* Minimap */
        #minimap-container {
            position: absolute;
            top: 20px;
            right: 20px;
            pointer-events: none;
        }
        #minimap {
            border: 1px solid rgba(0,255,0,0.3);
            border-radius: 4px;
            background: rgba(0,0,0,0.6);
        }
        #minimap-label {
            text-align: center;
            font-size: 10px;
            color: rgba(0,255,0,0.5);
            margin-top: 4px;
        }
        /* Nearest world indicator */
        #nearest-world {
            position: absolute;
            top: 80px;
            left: 20px;
            pointer-events: none;
            font-size: 11px;
            opacity: 0.6;
            color: #7df9ff;
        }
        /* Teleport menu */
        #teleport-menu {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,10,0.92);
            border: 1px solid rgba(0,255,100,0.3);
            border-radius: 8px;
            padding: 24px;
            max-height: 80vh;
            overflow-y: auto;
            pointer-events: auto;
            z-index: 100;
            min-width: 380px;
        }
        #teleport-menu h2 {
            margin: 0 0 16px 0;
            font-size: 18px;
            color: #0f0;
            text-align: center;
            letter-spacing: 2px;
        }
        #teleport-menu .world-entry {
            padding: 8px 12px;
            margin: 4px 0;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
        }
        #teleport-menu .world-entry:hover {
            background: rgba(0,255,100,0.1);
            border-color: rgba(0,255,100,0.4);
        }
        #teleport-menu .world-name {
            font-size: 14px;
            font-weight: bold;
        }
        #teleport-menu .world-agent {
            font-size: 11px;
            opacity: 0.5;
            margin-left: 12px;
        }
        #teleport-menu .world-meta {
            margin-top: 4px;
            font-size: 10px;
            opacity: 0.58;
            line-height: 1.35;
        }
        #teleport-menu .world-coords {
            color: #ffe08a;
        }
        #teleport-menu .world-badge {
            display: inline-block;
            margin-left: 8px;
            padding: 1px 5px;
            border: 1px solid rgba(125,249,255,0.25);
            border-radius: 999px;
            color: #8dffbf;
            white-space: nowrap;
        }
        #teleport-menu .world-badge.basic {
            color: #d6d6ff;
        }
        #teleport-menu .world-boundary {
            margin-top: 4px;
            max-width: 440px;
            color: #bda8ff;
            font-size: 10px;
            line-height: 1.35;
            opacity: 0.62;
        }
        #teleport-menu .world-actions {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
            flex-shrink: 0;
        }
        #teleport-menu .world-dist {
            font-size: 11px;
            opacity: 0.4;
            white-space: nowrap;
        }
        #teleport-menu .world-enter {
            color: #7df9ff;
            font-size: 11px;
            font-weight: bold;
            text-decoration: none;
            white-space: nowrap;
        }
        #teleport-menu .world-enter:hover, #teleport-menu .world-enter:focus-visible {
            color: #ffffff;
            text-shadow: 0 0 8px #7df9ff;
            outline: none;
        }
        #teleport-menu .close-hint {
            text-align: center;
            font-size: 10px;
            opacity: 0.4;
            margin-top: 12px;
        }
        /* Coordinate display */
        #coords {
            position: absolute;
            bottom: 50px;
            left: 20px;
            pointer-events: none;
            font-size: 10px;
            opacity: 0.4;
            color: #0f0;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-layer">
        <h1>The Universe</h1>
        <p>A collaborative 3D nexus of agent worlds.</p>
    </div>
    
    <div id="nearest-world"></div>
    
    <div id="minimap-container">
        <canvas id="minimap" width="180" height="180"></canvas>
        <div id="minimap-label">MINIMAP (top-down) &bull; Tab: Teleport</div>
    </div>
    
    <div id="controls-help">
        WASD / Arrows: Move camera<br>
        Mouse Drag: Look around<br>
        Scroll: Adjust speed<br>
        Tab: World directory &amp; teleport
    </div>
    
    <div id="coords"></div>
    <div id="interaction-prompt">Press E or Click to Enter World</div>
    <div id="teleport-menu">
        <h2>⬡ WORLD DIRECTORY ⬡</h2>
        <div id="teleport-list"></div>
        <div class="close-hint">Press Tab or Escape to close</div>
    </div>

    <div id="canvas-container"></div>

    <script type="module" src="./main.js"></script>
</body>
</html>
